<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>donasi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      min-height: 200vh; /* biar keliatan bisa discroll */
      background-color: rgba(241, 193, 82, .7);
    }

    .wrapper {
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    .foto-container {
      width: 90%;
      max-width: 900px;
      height: 70%;
      max-height: 1200px;
      overflow: hidden;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      background-color: #ddd;
    }

    .foto-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

  </style>
</head>
<body>

  <div class="wrapper">
    <div class="foto-container">
      <img src="img/blog-mini-2.jpg" alt="Foto">
    </div>
  </div>

</body>
</html>
